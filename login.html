<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold-primary: #D4AF37; --gold-light: #F9F1CC; --gold-dark: #AA8C2C;
            --bg-dark: #0a0a0a; --bg-card: rgba(20, 20, 20, 0.6);
            --gold-gradient: linear-gradient(135deg, #D4AF37, #F9F1CC, #B38728, #FBF5B7, #AA771C);
        }

        body { font-family: 'Kanit', sans-serif; background: var(--bg-dark); color: #fff; margin: 0; min-height: 100vh; overflow-x: hidden; padding-bottom: 90px; }
        
        /* Glassmorphism & Premium Cards */
        .glass-panel { background: rgba(15, 15, 15, 0.7); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(212, 175, 55, 0.15); border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .text-prime { background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Bottom Navigation */
        nav.bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(5, 5, 5, 0.85); backdrop-filter: blur(20px); border-top: 1px solid rgba(212, 175, 55, 0.1); display: flex; z-index: 1000; padding: 15px 0 25px 0; }
        .nav-btn { flex: 1; text-align: center; color: #444; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; display: flex; flex-direction: column; items-center; justify-center; transform: scale(0.9); }
        .nav-btn.active { color: var(--gold-primary); transform: scale(1); text-shadow: 0 0 15px rgba(212,175,55,0.4); }

        /* Smooth Tab Transitions */
        .tab-view { display: none; opacity: 0; transform: translateY(15px); transition: all 0.4s ease; }
        .tab-view.active { display: block; opacity: 1; transform: translateY(0); animation: slideUpFade 0.5s ease forwards; }
        @keyframes slideUpFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Input & Buttons */
        .prime-input { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: #fff; text-align: center; outline: none; transition: 0.3s; }
        .prime-input:focus { border-color: var(--gold-primary); box-shadow: 0 0 15px rgba(212,175,55,0.2); }
        .btn-gold { background: var(--gold-gradient); color: #000; font-weight: 900; transition: transform 0.2s, box-shadow 0.2s; }
        .btn-gold:active { transform: scale(0.95); box-shadow: 0 0 20px rgba(212,175,55,0.4); }

        /* Terminal Nav */
        .nav-card { filter: grayscale(100%); opacity: 0.5; transition: all 0.3s ease; border: 1px solid transparent; }
        .nav-card.active { filter: grayscale(0%); opacity: 1; border-color: var(--gold-primary); background: linear-gradient(180deg, rgba(212,175,55,0.1) 0%, rgba(0,0,0,0) 100%); box-shadow: inset 0 2px 10px rgba(212,175,55,0.1); }

        /* Custom Modal System */
        #custom-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 9999; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease; }
        .modal-box { transform: scale(0.9) translateY(20px); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #custom-modal-overlay.show { display: flex; opacity: 1; }
        #custom-modal-overlay.show .modal-box { transform: scale(1) translateY(0); }

        /* Toast Notifications */
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10000; display: flex; flex-col; gap: 10px; pointer-events: none; }
        .toast { background: rgba(15,15,15,0.95); border-left: 3px solid var(--gold-primary); padding: 12px 20px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 10px; animation: toastEnter 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .toast.toast-error { border-left-color: #ef4444; }
        .toast.toast-success { border-left-color: #22c55e; }
        @keyframes toastEnter { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes toastExit { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-20px); } }

        .error-shake { animation: shake 0.4s ease-in-out; border-color: #ef4444 !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, FacebookAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDne6T2ZmFrqP4idNGNHfp0CipTUxLkXHo",
            authDomain: "prime-store-487ac.firebaseapp.com",
            projectId: "prime-store-487ac",
            storageBucket: "prime-store-487ac.firebasestorage.app",
            messagingSenderId: "312275328003",
            appId: "1:312275328003:web:92459c25dde3fd115c0236",
            measurementId: "G-M8R7C11D8Z"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const ADMIN_EMAIL = "primestore.antmob@gmail.com";

        // ระบบ Custom Alert พรีเมียม
        const UIAlert = (title, desc) => {
            return new Promise((resolve) => {
                const overlay = document.getElementById('custom-modal-overlay');
                document.getElementById('modal-content').innerHTML = `
                    <h2 class="text-white font-black text-xl italic mb-2 tracking-widest uppercase">${title}</h2>
                    <p class="text-gray-400 text-[10px] mb-6 tracking-wider">${desc}</p>
                    <button id="close-btn" class="w-full py-4 bg-white/5 border border-white/10 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-white/10 transition">รับทราบ</button>
                `;
                overlay.style.display = 'flex';
                document.getElementById('close-btn').onclick = () => {
                    overlay.style.display = 'none';
                    resolve();
                };
            });
        };

        window.forceLogout = async () => {
            await signOut(auth);
            localStorage.clear();
            document.getElementById("msg").innerText = "CLEARED SUCCESSFUL";
            await UIAlert("LOGOUT COMPLETE", "ล้างสถานะการเข้าสู่ระบบบัญชีเดิมเรียบร้อยแล้วครับบรีส");
        };

        window.authAction = async (providerName) => {
            const msg = document.getElementById("msg");
            const loading = document.getElementById("loading-bar");
            
            msg.innerText = "AUTHENTICATING...";
            loading.classList.remove('hidden');
            
            let provider = providerName === 'google' ? new GoogleAuthProvider() : new FacebookAuthProvider();

            try {
                provider.setCustomParameters({ prompt: 'select_account' });
                const result = await signInWithPopup(auth, provider);
                const user = result.user;

                const loggedInEmail = user.email.toLowerCase().trim();
                const targetAdmin = ADMIN_EMAIL.toLowerCase().trim();

                localStorage.setItem('user_email', user.email);
                localStorage.setItem('user_name', user.displayName);
                localStorage.setItem('user_avatar', user.photoURL);

                const is_admin = (loggedInEmail === targetAdmin);
                await setDoc(doc(db, "users", user.uid), {
                    name: user.displayName, email: user.email,
                    role: is_admin ? "admin" : "member",
                    lastLogin: serverTimestamp()
                }, { merge: true });

                if (is_admin) {
                    msg.innerText = "SYSTEM ACCESS GRANTED: ADMIN";
                    msg.className = "text-yellow-500 text-[9px] font-black tracking-[0.4em] animate-pulse";
                    setTimeout(() => window.location.href = "admin.html", 1500);
                } else {
                    msg.innerText = "SYSTEM ACCESS GRANTED: USER";
                    msg.className = "text-emerald-400 text-[9px] font-black tracking-[0.4em]";
                    setTimeout(() => window.location.href = "index.html", 1500);
                }

            } catch (error) {
                console.error(error);
                loading.classList.add('hidden');
                msg.innerText = "ACCESS DENIED: " + error.code;
                msg.className = "text-red-500 text-[9px] font-black tracking-[0.4em]";
                await UIAlert("CONNECTION ERROR", "ไม่สามารถเข้าสู่ระบบได้: " + error.code);
            }
        };
    </script>
</body>
</html>
